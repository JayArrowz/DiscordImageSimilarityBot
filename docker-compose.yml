services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ${PGDATA_HOST_PATH}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  vllm:
    image: vllm/vllm-openai:v0.6.4.post1
    command: >
      --model ${VLLM_MODEL}
      --task embedding
      --served-model-name ${VLLM_SERVED_NAME}
      --trust-remote-code
      --chat-template /templates/vlm2vec_template.jinja
      --host 0.0.0.0
      --port 8000
      --max-model-len ${VLLM_MAX_MODEL_LEN:-4096}
      --tensor-parallel-size ${VLLM_TENSOR_PARALLEL_SIZE:-1}
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
    volumes:
      - ${HF_CACHE_HOST_PATH}:/root/.cache/huggingface
      - ./vlm2vec_template.jinja:/templates/vlm2vec_template.jinja:ro
    ports:
      - "8000:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "bash", "-c", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 180s
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      vllm:
        condition: service_healthy
    environment:
      # Discord (NetCord reads "Discord:Token" from config)
      Discord__Token: ${DISCORD_TOKEN}
      # Postgres connection string
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=${POSTGRES_DB};Port=5432;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};ConnectionLifeTime=60;"
      # AI / vLLM config — driven by the same .env that drives vLLM
      AiConfig__ApiUrl: "http://vllm:8000/v1"
      AiConfig__ApiKey: ${VLLM_API_KEY:-dummy}
      AiConfig__Model: ${VLLM_SERVED_NAME}
      AiConfig__VectorDimensions: ${AI_VECTOR_DIMENSIONS}
      AiConfig__ActionableThreshold: ${AI_ACTIONABLE_THRESHOLD}
      AiConfig__Bannable: ${AI_BANNABLE:-false}
      ASPNETCORE_ENVIRONMENT: Production
    volumes:
      - ${SOURCE_IMAGES_HOST_PATH}:/app/source_images
    restart: unless-stopped
